<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

      <link rel="stylesheet" href="/src/style.css">

  <!-- voor social media icons -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>





<div class="mx-auto max-w-360 px-4 py-20">

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">

        <div>
            <p class="text-sm font-medium uppercase tracking-widest text-gray-500">
                Contact
            </p>

            <h1 class="mt-4 text-6xl font-semibold leading-none">
                Laten we samen iets moois bouwen.
            </h1>

            <p class="mt-8 max-w-xl text-2xl text-gray-600 leading-relaxed">
                Heb je een vraag, idee of project? Neem gerust contact met ons op. Wij denken graag met je mee.
            </p>

            <div class="mt-16 space-y-10">

                <div>
                    <p class="text-lg font-medium text-gray-400">
                        E-mail
                    </p>

                    <a href="mailto:info@bedrijfshaven.nl" class="mt-2 block text-2xl  hover:opacity-70 transition">
                        info@bedrijfshaven.nl
                    </a>
                </div>

                <div>
                    <p class="text-lg font-medium text-gray-400">
                        Telefoon
                    </p>

                    <a href="tel:+31612345678" class="mt-2 block text-2xl hover:opacity-70 transition">
                        +31 6 12 34 56 78
                    </a>
                </div>

                <div>
                    <p class="text-lg font-medium text-gray-400">
                        Adres
                    </p>

                    <p class="mt-2 text-2xl  leading-relaxed">
                        Bedrijfshaven B.V.<br>
                        Voorbeeldstraat 12<br>
                        6041 AB Roermond
                    </p>
                </div>

            </div>
        </div>

        <div>
            <div class="rounded-3xl bg-neutral-100 p-10 lg:p-12">

                <form class=" space-y-6">

                    <div>
                        <label class="mb-3 block text-lg font-medium text-gray-600">
                            Naam
                        </label>

                        <input
                            type="text"
                            placeholder="Jouw naam"
                            class="w-full rounded-2xl border border-gray-200 bg-white px-6 py-4 outline-none transition focus:border-black"
                        >
                    </div>

                    <div>
                        <label class="mb-3 block text-lg font-medium text-gray-600">
                            E-mail
                        </label>

                        <input
                            type="email"
                            placeholder="jouw@email.nl"
                            class="w-full rounded-2xl border border-gray-200 bg-white px-6 py-4 outline-none transition focus:border-black"
                        >
                    </div>

                    <div>
                        <label class="mb-3 block text-lg font-medium text-gray-600">
                            Onderwerp
                        </label>

                        <input
                            type="text"
                            placeholder="Waar gaat het over?"
                            class="w-full rounded-2xl border border-gray-200 bg-white px-6 py-4 outline-none transition focus:border-black"
                        >
                    </div>

                    <div>
                        <label class="mb-3 block text-lg font-medium text-gray-600">
                            Bericht
                        </label>

                        <textarea
                            rows="6"
                            placeholder="Vertel ons meer over jouw project of vraag"
                            class="w-full rounded-2xl border border-gray-200 bg-white px-6 py-4 outline-none transition focus:border-black resize-none"
                        ></textarea>
                    </div>

                    <button class="inline-flex items-center gap-3 rounded-full bg-black px-6 py-4 text-white text-xl transition hover:opacity-80">

                        <span>
                            Bericht versturen
                        </span>

                        <span class="flex items-center justify-center rounded-full bg-white text-black size-7">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-4">
                                <path fill-rule="evenodd" d="M12.97 3.97a.75.75 0 0 1 1.06 0l7.5 7.5a.75.75 0 0 1 0 1.06l-7.5 7.5a.75.75 0 1 1-1.06-1.06l6.22-6.22H3a.75.75 0 0 1 0-1.5h16.19l-6.22-6.22a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
                            </svg>
                        </span>

                    </button>

                </form>

            </div>
        </div>

    </div>

</div>


    
</body>
</html>
